name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # JVM + JS: compile, test, conformance, and publish to integration repository.
  build:
    name: "JVM + JS (ubuntu x64)"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: ./.github/actions/gradle-cache
    - name: Set up java
      uses: actions/setup-java@v5
      with:
        distribution: corretto
        java-version: 17
    - name: Set up js stuff
      run: npm install protobufjs@7.2.6 long@5.2.3
    - name: Build and test
      run: ./gradlew clean check publishToIntegrationRepository -Dconformance.platforms=JVM,JS_IR --stacktrace --no-daemon
      env:
        ORG_GRADLE_PROJECT_publishNativeTargets: "false"
    - uses: actions/upload-artifact@v7
      with:
        name: integration-repository
        path: build/repos/integration
    # Cross-compile linuxArm64 test binaries for the arm64 runner
    - name: Cross-compile linuxArm64 test binaries
      run: ./gradlew linkDebugTestLinuxArm64 --stacktrace --no-daemon
    - uses: actions/upload-artifact@v7
      with:
        name: linuxArm64-test-binaries
        path: "**/build/bin/linuxArm64/debugTest/"

  # Gradle plugin integration tests across OS, Kotlin, and JDK versions.
  integration:
    name: "Integration (${{ matrix.os }}, Kotlin ${{ matrix.kotlin }}, JDK ${{ matrix.jdk }})"
    needs: build
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        kotlin: [ 2.1.21, 2.2.21, 2.3.10 ]
        jdk: [ 17, 21, 25 ]
        exclude:
          - kotlin: 2.1.21
            jdk: 25
          - kotlin: 2.2.21
            jdk: 25

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: ./.github/actions/gradle-cache
    - name: Set up java
      uses: actions/setup-java@v5
      with:
        distribution: corretto
        java-version: ${{ matrix.jdk }}
    - uses: actions/download-artifact@v8
      with:
        name: integration-repository
        path: build/repos/integration
    - name: Build and test
      run: ./gradlew "-Dkotlin-integration.version=${{ matrix.kotlin }}" "-Djava-integration.version=${{ matrix.jdk }}" build --stacktrace --no-daemon
      working-directory: gradle-plugin-integration-test
    - name: Verify configuration cache compatibility
      run: ./gradlew "-Dkotlin-integration.version=${{ matrix.kotlin }}" "-Djava-integration.version=${{ matrix.jdk }}" --configuration-cache build --stacktrace --no-daemon
      working-directory: gradle-plugin-integration-test

  # Native: compile, test, and run conformance on each host platform.
  #
  # Coverage:
  #   macOS arm64:  macosArm64, macosX64, iosArm64, iosX64, iosSimulatorArm64,
  #                 watchosArm32, watchosArm64, watchosX64, watchosSimulatorArm64,
  #                 watchosDeviceArm64, tvosArm64, tvosX64, tvosSimulatorArm64
  #   Linux x64:    linuxX64
  #   Linux arm64:  linuxArm64 (cross-compiled on x64, executed on arm64 runner)
  #   Windows x64:  mingwX64
  native:
    name: "Native (${{ matrix.name }})"
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple targets (macOS arm64)
            os: macos-14
            task: allTests -x jvmTest -x jsTest
            conformance: true
          - name: Linux x64
            os: ubuntu-latest
            task: linuxX64Test
            conformance: true
          # protoc command line exceeds Windows' CreateProcess limit in
          # examples; run specific runtime/core modules instead
          - name: Windows x64
            os: windows-latest
            task: :protokt-runtime:mingwX64Test :protokt-core-lite:mingwX64Test :protokt-core:mingwX64Test :protokt-runtime-grpc-lite:mingwX64Test :testing:multiplatform-testing:mingwX64Test
            conformance: false
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: ./.github/actions/gradle-cache
    - name: Set up java
      uses: actions/setup-java@v5
      with:
        distribution: corretto
        java-version: 17
    - name: Native tests
      run: ./gradlew ${{ matrix.task }} --stacktrace --no-daemon
    - name: Native conformance
      if: matrix.conformance
      run: ./gradlew :testing:conformance:runner:test -Dconformance.platforms=NATIVE --stacktrace --no-daemon

  # Linux arm64: run cross-compiled test binaries on a native arm64 runner.
  # Kotlin/Native doesn't ship a linux arm64 host toolchain yet (KT-36871),
  # so we cross-compile on x64 and execute on arm64.
  native-linux-arm64:
    name: "Native (Linux arm64)"
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: linuxArm64-test-binaries
    - name: Run linuxArm64 tests
      run: |
        find . -name "test.kexe" -type f | while read binary; do
          echo "Running: $binary"
          chmod +x "$binary"
          "$binary"
        done
